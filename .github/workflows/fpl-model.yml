# .github/workflows/fpl-model.yml  — build live v2 data + deploy wirtzplay
# Rebuilds v2.json from the FPL API every 3 hours (and on push / manual), then
# deploys model-app/site to the Cloudflare Pages project "wirtzplay".
# build_v2.py uses only Python's stdlib, so no pip install is needed.

name: FPL — build & deploy

on:
  push:
    branches: [main]
    paths:
      - "model-app/**"
      - ".github/workflows/fpl-model.yml"
  schedule:
    - cron: "0 */3 * * *"      # every 3 hours UTC
  workflow_dispatch: {}

concurrency:
  group: fpl-deploy
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Build live v2 data
        run: V2_OUT=model-app/site/v2.json python3 model-app/build_v2.py

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy model-app/site --project-name=wirtzplay --branch=main --commit-dirty=true
