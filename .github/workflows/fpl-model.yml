# .github/workflows/fpl-model.yml — refresh all FPLanner data feeds + deploy
# The model rebuilds every 3h; the PAID odds call is throttled (see build_odds.py):
# only on manual refresh, when odds.json is >=12h old, or at the 6pm/10pm SGT windows.
#   v2.json        — live squad + mini-league (FPL API, stdlib)
#   xg.json        — per-match team xG for/against (FPL API, stdlib)
#   odds.json      — de-vigged bookmaker market (The Odds API, throttled)
#   titleodds.json — model title/top-4/relegation odds (DC+Elo, needs pandas/numpy/scipy)

name: FPL — build & deploy

on:
  push:
    branches: [main]
    paths:
      - "model-app/**"
      - ".github/workflows/fpl-model.yml"
  schedule:
    - cron: "0 */3 * * *"      # every 3h UTC — model rebuild (odds reused unless due)
    - cron: "0 10 * * *"      # 18:00 SGT — scheduled odds window
    - cron: "0 14 * * *"      # 22:00 SGT — scheduled odds window
  workflow_dispatch: {}

concurrency:
  group: fpl-deploy
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install model deps
        run: pip install pandas numpy scipy

      # carry the live odds snapshot forward so build_odds can see its age (throttle)
      - name: Carry over odds snapshot + market ledger from the live site
        run: |
          curl -fsS https://wirtzplay.pages.dev/odds.json -o model-app/site/odds.json \
            && echo "carried over odds snapshot" || echo "no live odds yet (first run or odds off)"
          curl -fsS https://wirtzplay.pages.dev/market_history.json -o model-app/site/market_history.json \
            && echo "carried over market ledger" || echo "no market ledger yet"

      - name: Build live squad + league (v2.json)
        run: V2_OUT=model-app/site/v2.json python3 model-app/build_v2.py

      - name: Build xG feed (xg.json)
        run: XG_OUT=model-app/site/xg.json python3 model-app/build_xg.py

      - name: Build fixtures (fixtures.json)
        run: FIXTURES_OUT=model-app/site/fixtures.json python3 model-app/build_fixtures.py

      - name: Refresh bookmaker odds (throttled)
        run: ODDS_OUT=model-app/site/odds.json python3 model-app/build_odds.py
        env:
          ODDS_API_KEY: ${{ secrets.ODDS_API_KEY }}
          # a manual run (the in-app Rebuild button) forces a fresh odds fetch; schedule/push don't
          FORCE_ODDS: ${{ github.event_name == 'workflow_dispatch' && '1' || '' }}

      - name: Build title odds (titleodds.json)
        run: FPL_OUT_DIR="$PWD/model-app/site" python3 model-app/build_titleodds.py



      - name: Build players (players.json)
        run: PLAYERS_OUT=model-app/site/players.json python3 model-app/build_players.py

      - name: Build transfer targets (recommend.json)
        run: REC_OUT=model-app/site/recommend.json python3 model-app/build_recommend.py

      - name: Build optimal squad (squad.json)
        run: SQUAD_OUT=model-app/site/squad.json python3 model-app/build_squad.py

      - name: Build chip plan (chips.json)
        run: CHIPS_OUT=model-app/site/chips.json python3 model-app/build_chips.py

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy model-app/site --project-name=wirtzplay --branch=main --commit-dirty=true
