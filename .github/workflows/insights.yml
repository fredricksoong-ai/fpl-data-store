name: Generate AI insights

# Runs a little AFTER your data refresh so insights reflect fresh data.
# Adjust the cron times to ~10-15 min after your existing data workflow.
on:
  schedule:
    - cron: "15 5 * * *"    # 05:15 UTC
    - cron: "15 17 * * *"   # 17:15 UTC
  workflow_dispatch: {}      # lets you run it manually from the Actions tab

permissions:
  contents: write            # needed to commit insights.json back to the repo

concurrency:
  group: insights
  cancel-in-progress: false

jobs:
  insights:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install SDK
        run: pip install --quiet google-genai

      - name: Generate insights
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          # GEMINI_MODEL: gemini-2.5-flash   # optionally pin/upgrade the model here
          # FPL_DATA_DIR: live               # change if your JSON lives elsewhere
        run: python scripts/generate_insights.py

      - name: Commit if changed
        run: |
          git config user.name "insights-bot"
          git config user.email "actions@users.noreply.github.com"
          git add live/insights.json || true
          git diff --staged --quiet || git commit -m "chore: update AI insights"
          git push
