<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="theme-color" content="#0b1220">
<title>Default page — My Team + League</title>
<style>
  :root{
    --bg:#0b1220;--card:#121c2e;--card2:#0f1827;--line:#1f2c44;--ink:#e8eef7;--muted:#90a0b8;--faint:#647089;
    --good:#34d399;--away:#f59e0b;--bad:#f87171;--pick:#a78bfa;--fpl:#00ff85;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  body{background:var(--bg);color:var(--ink);font:14px/1.45 -apple-system,BlinkMacSystemFont,"Segoe UI",Inter,Roboto,sans-serif;-webkit-font-smoothing:antialiased;padding:env(safe-area-inset-top) 0 0;touch-action:manipulation}
  .wrap{max-width:560px;margin:0 auto;padding:0 14px}
  .hidden{display:none}

  /* header */
  header{padding:14px 0 2px}
  .hrow{display:flex;align-items:center;gap:8px}
  h1{font-size:19px;font-weight:800;letter-spacing:.2px;flex:1;min-width:0;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .hright{flex:none;display:flex;align-items:center;gap:8px}
  .hcd{flex:none;font-size:12px;font-weight:700;color:var(--ink);white-space:nowrap;cursor:pointer}
  .pillrow{display:flex;gap:7px;flex-wrap:wrap;margin-top:11px}
  .pill{background:var(--card);border:1px solid var(--line);border-radius:999px;padding:6px 12px;font-size:12.5px;color:var(--muted);white-space:nowrap;font-variant-numeric:tabular-nums}
  .pill .k{color:var(--faint);font-weight:600;margin-right:5px;font-size:11px;text-transform:uppercase;letter-spacing:.3px}
  .pill b{color:var(--ink);font-weight:800}
  .pill.mut,.pill.mut .k{color:var(--faint)} .pill.mut b{color:var(--muted);font-weight:700}
  .mu{color:var(--muted);font-weight:600}
  .am{color:var(--away)!important}.gd{color:var(--good)!important}.bd{color:var(--bad)!important}.pk{color:var(--pick)!important}
  .sl{color:var(--faint);margin:0 5px}
  .updated{font-size:11px;color:var(--faint);margin-top:11px}.updated b{color:var(--muted);font-weight:600}

  main{padding:10px 0 78px}
  .card{scroll-margin-top:12px;margin:10px 0}
  .ctitle{font-size:11px;font-weight:700;letter-spacing:.5px;text-transform:uppercase;color:var(--faint);margin:0 4px 8px;display:flex;align-items:center;gap:8px}
  .ctitle::after{content:"";flex:1;height:1px;background:var(--line)}
  .flash{animation:fl 1.2s ease-out}
  @keyframes fl{0%{box-shadow:0 0 0 2px var(--fpl),0 0 16px rgba(0,255,133,.4)}100%{box-shadow:0 0 0 0 rgba(0,255,133,0)}}

  /* legend + pitch */
  .legend{flex:1;display:flex;justify-content:center;flex-wrap:wrap;gap:8px;align-items:center;font-size:8.5px;color:var(--muted)}
  .lg.dnp{color:var(--faint)} .ld.dnpd{background:repeating-linear-gradient(45deg,currentColor,currentColor 1.5px,transparent 1.5px,transparent 3px)}
  .lg{display:inline-flex;align-items:center;gap:4px;white-space:nowrap}
  .ld{width:8px;height:8px;border-radius:50%;border:1.5px solid currentColor;flex:none}
  .gkrow{display:flex;align-items:center;justify-content:space-between;gap:6px}
  .gkstats{flex:1;min-width:0;font-size:10.5px;color:var(--muted);line-height:1.3}
  .gkstats.l{text-align:right;padding-right:4px} .gkstats.r{text-align:left;padding-left:4px}
  .gkstats b{color:var(--ink);font-weight:800} .gk-s{font-size:9px;letter-spacing:.3px;color:var(--faint);text-transform:uppercase} .gk-m{color:var(--faint)}
  .lg.yet{color:var(--faint)}.lg.red{color:var(--bad)}.lg.gold{color:#e0b53a}.lg.green{color:var(--good)}.lg.purple{color:var(--pick)}
  .pitch{position:relative;border:1px solid var(--line);border-radius:18px;padding:12px 8px 14px;overflow:hidden;background:radial-gradient(120% 80% at 50% -10%,rgba(0,255,133,.05),transparent 55%),var(--card2)}
  .pitch::before{content:"";position:absolute;left:8%;right:8%;top:46%;height:1px;background:rgba(255,255,255,.05)}
  .pitch::after{content:"";position:absolute;left:50%;top:48%;width:110px;height:110px;border:1px solid rgba(255,255,255,.05);border-radius:50%;transform:translate(-50%,-50%)}
  .prow{display:flex;justify-content:center;align-items:center;gap:6px;margin:5px 0}
  .bub{position:relative;display:flex;align-items:center;justify-content:center;border-radius:11px;text-align:center;flex:none;padding:0 4px}
  .bub .in{display:flex;flex-direction:column;align-items:center;gap:2px;line-height:1.05;max-width:100%;padding:0 1px}
  .bub .nm{font-weight:700;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;word-break:normal;overflow-wrap:normal;line-height:1.06;max-width:100%}
  .bub .sub{font-weight:600;opacity:.82;white-space:nowrap}
  .bub .sub .xp{font-weight:700;color:var(--ink)} .bub .sub .tm{color:var(--muted);font-weight:600} .bub .sub .pos{color:var(--muted);font-weight:700;letter-spacing:.3px}
  .bub.dnp{background:repeating-linear-gradient(45deg,rgba(255,255,255,.03),rgba(255,255,255,.03) 5px,rgba(255,255,255,.085) 5px,rgba(255,255,255,.085) 10px);border:2px solid rgba(255,255,255,.16);color:var(--muted)}
  .bub.yet{background:rgba(255,255,255,.03);border:2px solid rgba(255,255,255,.22);color:var(--muted)}
  .bub.red{background:rgba(248,113,113,.15);border:2px solid var(--bad);color:#fca5a5}
  .bub.gold{background:rgba(224,181,58,.15);border:2px solid #cda227;color:#f3d785}
  .bub.green{background:rgba(52,211,153,.16);border:2px solid var(--good);color:#82edc0}
  .bub.purple{background:rgba(167,139,250,.18);border:2px solid var(--pick);color:#c9bcfa}
  .bub.vc{border-width:3px;border-color:rgba(255,255,255,.6)}
  .bub.cap{border-width:4px;border-color:rgba(255,255,255,.92)}
  .cnr{position:absolute;width:16px;height:16px;border-radius:50%;display:flex;align-items:center;justify-content:center;border:2px solid var(--card2);font-size:11px;font-weight:800;background:#f1f4f9;z-index:2;line-height:1}
  .cnr svg{display:block}
  .c-tr{top:-4px;right:-4px}.c-tl{top:-4px;left:-4px;z-index:2}.c-tl2{top:-4px;left:5px;z-index:3}.c-bl{bottom:-4px;left:-4px}.c-br{bottom:-4px;right:-4px}
  .b-cap{background:var(--fpl);color:#06231a}.b-vc{background:#86f3bf;color:#06231a}
  .b-icon{background:#0d1626;border-color:var(--card2)}
  .b-warn{background:var(--away);color:#3a2400;font-size:11px}
  .benchsep{height:1px;background:var(--line);margin:14px 12px 10px}
  .bench{display:flex;justify-content:center;gap:6px;flex-wrap:nowrap;padding:2px}.bench .bub{opacity:.85}

  /* league table */
  .lgcard{background:var(--card);border:1px solid var(--line);border-radius:14px;overflow-x:auto}
  table{width:100%;border-collapse:separate;border-spacing:0;font-size:13px;min-width:480px}
  th{background:var(--card2);color:var(--muted);font-size:11px;letter-spacing:.2px;font-weight:700;padding:8px 10px;text-align:left;border-bottom:1px solid var(--line)}
  th:first-child,td:first-child{position:sticky;left:0;z-index:2;background:var(--card);box-shadow:1px 0 0 var(--line);white-space:nowrap}
  th:first-child{background:var(--card2);z-index:3}
  tr.me td:first-child{background:#10261c}
  .cu1{font-weight:500;color:var(--faint)} .cu2{font-weight:800;color:var(--ink)}
  .backbtn{margin-left:auto;width:28px;height:28px;border-radius:8px;border:1px solid var(--line);background:var(--card2);color:var(--muted);display:flex;align-items:center;justify-content:center;cursor:pointer}
  .backbtn:active{transform:scale(.93);color:var(--fpl)} .backbtn svg{width:15px;height:15px}
  th.r,td.r{text-align:right} td{padding:9px 10px;border-bottom:1px solid var(--line);font-variant-numeric:tabular-nums}
  tr:last-child td{border-bottom:none}
  tr.me td{background:rgba(0,255,133,.08)}
  .rk{color:var(--muted);width:20px} .tm{font-weight:700} .mgr{color:var(--faint);font-weight:400;font-size:11px;margin-left:6px}
  .gwp{color:var(--good);font-weight:700}
  .pitch-top{display:flex;flex-direction:column;align-items:center;gap:5px;margin-bottom:7px}
  .pt-name{display:flex;align-items:baseline;justify-content:center;gap:5px;max-width:100%}
  #whoName{color:var(--muted);font-weight:700;font-size:13px;max-width:150px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  .who-val{color:var(--faint);font-size:11px;font-weight:600;white-space:nowrap}
  .gwpills{display:flex;flex-direction:column;align-items:center;gap:5px;width:100%}
  .gwpills .pill{white-space:nowrap;letter-spacing:-.1px}
  .gwpills .pill.ptop{padding:5px 12px;font-size:10.5px;border-color:rgba(0,255,133,.55);background:rgba(0,255,133,.07)}
  .gwpills .pill.pbot{padding:3px 11px;font-size:8.5px}
  .gwpills .pill b{font-weight:700} .gwpills .pill .sl{margin:0 3px}
  .pitch-bottom{display:flex;align-items:center;gap:8px;margin-top:10px}
  #whoBack{flex:none}
  .tm{cursor:pointer} tr:not(.me) .tm:active{color:var(--fpl)}
  .lsub{color:var(--faint);font-size:10.5px;margin-top:2px}
  .lchip{display:inline-block;margin-left:6px;background:rgba(0,255,133,.14);color:var(--fpl);border-radius:5px;padding:1px 5px;font-size:9.5px;font-weight:700;vertical-align:1px}
  .lname{font-weight:800;cursor:pointer} tr:not(.me) .lname:active{color:var(--fpl)}
  .lme{background:rgba(0,255,133,.16);color:var(--fpl);border-radius:7px;padding:1px 7px}
  .chipnow{display:inline-block;margin-left:7px;background:#0b1422;border:1px solid var(--line);border-radius:7px;padding:2px 7px;font-size:11px;font-weight:800;color:var(--ink);vertical-align:1px}
  .lsub{color:var(--muted);font-size:11px;margin-top:3px}
  .lsub2{color:var(--faint);font-size:10.5px;margin-top:2px}
  .gwbox{display:inline-flex;align-items:center;justify-content:center;width:36px;height:30px;border-radius:8px;font-weight:800;font-variant-numeric:tabular-nums}
  .gwbox.red{background:rgba(248,113,113,.18);color:#fca5a5}.gwbox.gold{background:rgba(224,181,58,.18);color:#f3d785}
  .gwbox.green{background:rgba(52,211,153,.2);color:#82edc0}.gwbox.purple{background:rgba(167,139,250,.22);color:#c9bcfa}
  .gap{color:var(--good);font-size:10px;font-weight:700;vertical-align:5px;margin-left:1px}
  .xv.g{color:var(--good)}.xv.a{color:var(--away)}.xv.r{color:var(--bad)}.xv{font-weight:700}
  .icn{width:13px;height:13px;vertical-align:-2px;margin-left:5px;opacity:.6}

  /* bottom bar (WC26) — accent swapped to FPL green */
  .bottombar{position:fixed;left:0;right:0;bottom:0;display:flex;align-items:flex-end;justify-content:space-around;gap:8px;padding:40px 26px 8px;padding-bottom:calc(8px + env(safe-area-inset-bottom));background:linear-gradient(to top,rgba(6,6,12,.9),rgba(6,6,12,.5) 42%,rgba(6,6,12,0));z-index:40;pointer-events:none}
  .bottombar .bbtn{pointer-events:auto}
  .bbtn{width:44px;height:44px;border-radius:50%;background:rgba(20,20,32,.5);backdrop-filter:blur(12px) saturate(150%);-webkit-backdrop-filter:blur(12px) saturate(150%);border:1px solid rgba(255,255,255,.16);color:var(--ink);cursor:pointer;display:flex;align-items:center;justify-content:center;line-height:0;font-family:inherit;box-shadow:0 3px 14px rgba(0,0,0,.45);-webkit-tap-highlight-color:transparent}
  .bbtn:active{transform:scale(.92)}.bbtn svg{display:block}
  .bbtn-mid{width:50px;height:50px;background:rgba(0,255,133,.45);border-color:rgba(0,255,133,.7);color:#04140c}
  .bbhit{position:fixed;bottom:0;height:74px;width:34%;z-index:39;pointer-events:auto}.bbhit-l{left:0}.bbhit-r{right:0}
  .bsheet{position:fixed;bottom:84px;z-index:45;background:var(--card2);border:1px solid var(--line);border-radius:14px;padding:6px;max-height:60vh;overflow:auto;box-shadow:0 10px 30px rgba(0,0,0,.45)}
  .bsheet-l{left:14px;width:204px}.bsheet-r{right:14px;width:182px}
  .brow{display:flex;align-items:center;gap:10px;padding:11px 10px;border-radius:9px;font-size:14px;cursor:pointer;color:var(--ink)}
  .brow:active{background:rgba(255,255,255,.06)}.brow .bic{width:20px;text-align:center;color:var(--fpl);font-size:16px}
  .tabrow{padding:11px 10px;border-radius:9px;font-size:14px;cursor:pointer;color:var(--ink)}
  .tabrow.on{background:rgba(0,255,133,.14);color:var(--fpl);font-weight:600}
  .bbtoast{position:fixed;left:50%;transform:translateX(-50%);bottom:88px;z-index:48;background:#1d2b22;border:1px solid var(--line);color:var(--ink);font-size:12px;padding:8px 14px;border-radius:10px;opacity:0;transition:opacity .25s;pointer-events:none}.bbtoast.show{opacity:1}
  /* title odds */
  .tsub{color:var(--muted);font-size:12px;line-height:1.5;margin:2px 2px 12px}
  .orow{display:flex;align-items:center;gap:10px;padding:8px 4px;border-bottom:1px solid var(--line)}
  .orow:last-of-type{border-bottom:none}
  .trk{width:20px;text-align:right;color:var(--muted);font-size:12px;font-variant-numeric:tabular-nums}
  .tnm{font-weight:700;font-size:14px}
  .obar{height:7px;border-radius:5px;background:var(--card2);margin-top:5px;overflow:hidden}
  .obar i{display:block;height:100%;background:var(--fpl);border-radius:5px}
  .tmeta{font-size:10.5px;color:var(--muted);margin-top:4px}
  .tpct{text-align:right;min-width:46px}.tpct b{color:var(--fpl);font-weight:800;font-size:13px}.tpct span{display:block;font-size:9.5px;color:var(--muted)}
  .ctitle2{font-weight:800;font-size:13px;margin:18px 2px 8px;color:var(--ink)}
  .ttab{width:100%;border-collapse:separate;border-spacing:0;font-size:12.5px;font-variant-numeric:tabular-nums}
  .ttab th{background:var(--card2);color:var(--muted);font-size:10.5px;font-weight:700;padding:7px 8px;text-align:left;border-bottom:1px solid var(--line)}
  .ttab th.r,.ttab td.r{text-align:right}
  .ttab td{padding:7px 8px;border-bottom:1px solid var(--line)}
  .ttab tr:last-child td{border-bottom:none}
  .ttab .trk2{color:var(--muted);width:22px}.ttab .ttm{font-weight:600}
  .ttab td.g{color:var(--good)}.ttab td.rd{color:var(--bad)}
  .ttab tr.t4 td{background:rgba(0,255,133,.05)} .ttab tr.relrow td{background:rgba(248,113,113,.06)}
  .tnote{color:var(--faint);font-size:10.5px;line-height:1.5;margin:12px 2px 2px}
  .bdg{width:11px;height:11px;vertical-align:-1px;margin-right:3px;object-fit:contain;display:inline-block}
  .bdg.lg{width:18px;height:18px;vertical-align:-4px;margin-right:6px}
  .ttab .ttm{display:flex;align-items:center}.tnm{display:flex;align-items:center}
  /* xG page */
  .err{padding:20px 4px;color:var(--muted);font-size:12.5px;line-height:1.5}
  .oddsel{display:flex;gap:6px;flex-wrap:wrap;margin:0 2px 10px}
  .oddsel .opt{font-size:12px;padding:5px 10px;border-radius:8px;background:var(--card2);border:1px solid var(--line);color:var(--muted);cursor:pointer}
  .oddsel .opt.on{background:rgba(0,255,133,.16);border-color:rgba(0,255,133,.5);color:var(--fpl);font-weight:600}
  .xgrow2{display:grid;grid-template-columns:64px 42px 62px 1fr 44px;gap:7px;align-items:center;padding:3px 0;font-size:12px}
  .xg-head{color:#6b7a90;font-size:10.5px;padding-top:10px}
  .xg-team{font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .xg-d{color:var(--muted);font-size:11px;font-variant-numeric:tabular-nums;white-space:nowrap}
  .xgctl{display:flex;align-items:center;gap:10px;margin-top:8px;flex-wrap:wrap}
  .xgsel{flex:1;min-width:140px;background:var(--card2);color:var(--ink);border:1px solid var(--line);border-radius:8px;padding:7px 8px;font-size:12px;font-family:inherit}
  .xgslide{display:flex;align-items:center;gap:8px;flex:1;min-width:150px;margin-top:12px}
  .xgslide input[type=range]{flex:1;accent-color:#00ff85}
  .xgslide .m{font-size:11px;white-space:nowrap;color:var(--muted);min-width:78px}
  .xgreset{flex:none;width:34px;height:34px;border-radius:8px;background:var(--card2);border:1px solid var(--line);color:var(--muted);display:flex;align-items:center;justify-content:center;cursor:pointer}
  .xgreset:active{transform:scale(.93)}
  .xg-bar{position:relative;height:13px}
  .xg-mid{position:absolute;left:50%;top:-1px;bottom:-1px;width:1px;background:var(--line)}
  .xg-fill{position:absolute;top:2px;height:9px;border-radius:3px;min-width:2px}
  .xg-val{text-align:right;font-weight:700;font-variant-numeric:tabular-nums}
  .xgdetail{font-size:11.5px;color:var(--muted);margin-top:10px;border-top:1px solid var(--line);padding-top:8px}
  .xgdetail:empty{display:none}
  .xgd-h{margin-bottom:4px;font-size:12px} .xgd-sum{font-size:11px;line-height:1.4;margin:2px 0 7px}
  .xggrow{padding:6px 0;border-top:1px solid var(--line)}
  .xgg{display:grid;grid-template-columns:26px 56px 40px 46px 1fr;gap:8px;align-items:center;font-size:11.5px}
  .xgg-head{color:#6b7a90;font-size:10.5px;padding-bottom:2px}
  .xgg-gw{text-align:center;color:var(--muted)} .xgg-o{font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .xgg-s{text-align:center;font-weight:700;color:var(--ink);font-variant-numeric:tabular-nums}
  .xgg-n{text-align:center;font-variant-numeric:tabular-nums;color:var(--muted)}
  .xgg-l{text-align:right;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .xgg-ctx{text-align:right;font-size:11px;color:var(--muted);margin-top:1px}
</style>
</head>
<body>
<header class="wrap">
  <div class="hrow"><h1>⚽️ FPLanner ⚽️</h1><span class="hright"><span id="oddsslot"></span><span id="nextcd" class="hcd"></span></span></div>
  <div class="updated">Last updated: <b id="updatedTime">…</b></div>
</header>

<main class="wrap" id="myteam">
  <section class="card" id="card-squad">
    <div class="pitch">
      <div class="pitch-top">
        <div class="pt-name"><span id="whoName">wirtzplay</span></div>
        <div id="gwpill" class="gwpills"></div>
      </div>
      <div id="pitchrows"></div>
      <div class="benchsep"></div>
      <div class="bench" id="bench"></div>
      <div class="pitch-bottom">
        <div class="legend">
          <span class="lg yet">Yet to play</span>
          <span class="lg dnp">DNP</span>
          <span class="lg red">0–3</span>
          <span class="lg gold">4–8</span>
          <span class="lg green">9–13</span>
          <span class="lg purple">14+</span>
        </div>
        <span id="whoBack" class="backbtn hidden" onclick="backHome()" title="Back to my team"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20 11a8 8 0 1 0-.5 4"/><path d="M20 4v5h-5"/></svg></span>
      </div>
    </div>
  </section>

  <section class="card" id="card-league">
    <div class="ctitle">Ballon d'FPL · mini-league</div>
    <div class="lgcard"><table id="lgtable"></table></div>
  </section>
  <div style="height:55vh" aria-hidden="true"></div>
</main>

<main class="wrap" id="titleview" style="display:none">
  <section class="card" id="card-title">
    <div class="ctitle">Title Odds · 2026/27</div>
    <div id="titlebody"></div>
  </section>
  <div style="height:55vh" aria-hidden="true"></div>
</main>

<main class="wrap" id="xgview" style="display:none">
  <section class="card" id="card-xg">
    <div class="ctitle">xG · expected vs actual</div>
    <div id="xg"></div>
  </section>
  <div style="height:55vh" aria-hidden="true"></div>
</main>

<div id="bbtoast" class="bbtoast"></div>
<div id="sheetActions" class="bsheet bsheet-l hidden">
  <div class="brow" onclick="barAction('rebuild',event)"><span class="bic">↻</span>Rebuild</div>
  <div class="brow" onclick="barAction('export',event)"><span class="bic">⤒</span>Export</div>
  <div class="brow" onclick="barAction('copy',event)"><span class="bic">⧉</span>Copy for Claude</div>
</div>
<div id="sheetTabs" class="bsheet bsheet-r hidden"></div>

<script>
/* header bits */
function oddsRing(c,cap=500){const f=Math.max(0,Math.min(1,c/cap)),C=2*Math.PI*8,off=C*(1-f);const col=c>100?"var(--good)":c>30?"var(--away)":"var(--bad)";
  return `<span class="pill" title="Odds API credits left (of ${cap})" style="display:inline-flex;align-items:center;gap:6px;padding:5px 9px;font-size:11px"><svg width="18" height="18" viewBox="0 0 20 20"><circle cx="10" cy="10" r="8" fill="none" stroke="rgba(255,255,255,.12)" stroke-width="2.6"/><circle cx="10" cy="10" r="8" fill="none" stroke="${col}" stroke-width="2.6" stroke-linecap="round" stroke-dasharray="${C.toFixed(1)}" stroke-dashoffset="${off.toFixed(1)}" transform="rotate(-90 10 10)"/></svg><b style="color:var(--ink)">${c}</b></span>`;}
function fmtCd(ms){const m=Math.max(0,Math.floor(ms/6e4)),d=Math.floor(m/1440),h=Math.floor(m%1440/60);return d>0?`${d}d ${h}h`:`${h}h`;}
document.getElementById('oddsslot').innerHTML=oddsRing(412);
document.getElementById('nextcd').innerHTML=`🔒 ${fmtCd((2*1440+14*60)*6e4)}`;

/* squad pitch */
// type,name,pts,own,played,C,VC,bench,opp,kickoff(when unplayed)
// ...,opp,ko,goals,assists,transferredIn
/* squads / stats / league are loaded live from v2.json — see the fetch at the bottom */
function tier(p){const s=p[4];if(s===0)return"yet";if(s===2)return"dnp";const v=p[2];return v<=3?"red":v<=8?"gold":v<=13?"green":"purple";}
const GAP=6, tileW=o=>122-Math.min(o,55)/55*28, TILEH=84;  // width by ownership; lines of >3 split into two staggered rows so tiles stay wide; tall enough for 3 text lines
/* populated by the v2.json fetch at the bottom */
let SQUADS={}, STATS={}, MYNAMES=new Set(), ME="wirtzplay", GWNO=0, VIEWING="wirtzplay";
const squadFor=t=>SQUADS[t]||SQUADS[ME]||[];
const gwCol=(gw,avg)=>{const r=gw/avg;return r<0.9?'bd':r<=1.1?'am':r<1.5?'gd':'pk';};
const I_GOAL='⚽';
const I_ASSIST='👟';
const I_XFER='<svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="#16a34a" stroke-width="3.2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 12h12M11 7l5 5-5 5"/></svg>';
/* PL club 3-letter code -> official badge code (resources.premierleague.com) */
const BADGE={ARS:3,AVL:7,BHA:36,BOU:91,BRE:94,CHE:8,COV:45,CRY:31,EVE:11,FUL:54,HUL:88,IPS:40,LEE:2,LIV:14,MCI:43,MUN:1,NEW:4,NFO:17,SUN:56,TOT:6,BUR:90,WHU:21,WOL:39,LEI:13,SOU:20,IPW:40};
const logo=(code,cls)=>BADGE[code]?`<img class="bdg${cls?' '+cls:''}" src="https://resources.premierleague.com/premierleague/badges/50/t${BADGE[code]}.png" alt="" loading="lazy">`:'';
function bub(p,SC,H,bn){const w=Math.round(tileW(p[3])*SC),h=Math.round(H!=null?H:TILEH*SC),s=p[4];  // width by ownership; H lets bench keep full height while width is scaled down; bn=bench
  const POS=['','GK','DEF','MID','FWD'][p[0]]||'';
  const fdrCol=d=>d>=4?'var(--bad)':(d>0&&d<=2)?'var(--good)':'var(--muted)';
  const xp=(p[13]!=null&&p[13]!=='')?(+p[13]).toFixed(1):'';
  // line 2: pre-game = opp(FDR) + kickoff; once played = opp + points (FDR/timing drop away)
  const ol=logo(p[8]);
  const l2=s===0?`${ol}<span style="color:${fdrCol(p[14])}">${p[8]}</span>${p[9]?` <span class="tm">${p[9]}</span>`:''}`
          :s===2?`${ol}${p[8]} • DNP`
          :`${ol}${p[8]} • ${p[2]} pts`;
  // line 3: position (+ inline xPts on wide starter tiles); narrow bench tiles push xPts to line 4
  const xps=xp?`<span class="xp">${xp} xPts</span>`:'';
  const l3=bn?`<span class="pos">${POS}</span>`:`<span class="pos">${POS}</span>${xp?` • ${xps}`:''}`;
  const l4=(bn&&xp)?`<span class="sub" style="font-size:${Math.max(7.5,Math.min(10,h*0.20)).toFixed(1)}px">${xps}</span>`:'';
  const seg=Math.max(1,...String(p[1]).split(/[ \-]/).map(x=>x.length));  // longest unbreakable chunk
  const nf=Math.max(7.5,Math.min(12,h*0.30,(w-12)/(seg*0.6))).toFixed(1);  // fit that chunk; names wrap at spaces/hyphens
  const sf=Math.max(7.5,Math.min(10,h*0.20)).toFixed(1);
  const g=p[10],a=p[11],ti=p[12],warn=VIEWING!==ME&&!MYNAMES.has(p[1]);
  let bd='';
  if(p[5])bd+='<span class="cnr c-tr b-cap">C</span>';else if(p[6])bd+='<span class="cnr c-tr b-vc">V</span>';
  if(g&&a)bd+=`<span class="cnr c-tl b-icon">${I_GOAL}</span><span class="cnr c-tl2 b-icon">${I_ASSIST}</span>`;
  else if(g)bd+=`<span class="cnr c-tl b-icon">${I_GOAL}</span>`;else if(a)bd+=`<span class="cnr c-tl b-icon">${I_ASSIST}</span>`;
  if(ti)bd+=`<span class="cnr c-bl">${I_XFER}</span>`;
  if(warn)bd+='<span class="cnr c-br b-warn">!</span>';
  return `<div class="bub ${tier(p)} ${p[5]?'cap':p[6]?'vc':''}" style="width:${w}px;height:${h}px"><div class="in"><span class="nm" style="font-size:${nf}px">${p[1]}</span><span class="sub" style="font-size:${sf}px">${l2}</span><span class="sub" style="font-size:${sf}px">${l3}</span>${l4}</div>${bd}</div>`;}
function gwPill(team){const s=STATS[team]||STATS[ME]||{gw:0,avg:1,ml:'',gap:'',op:0,ovr:'',ovrUp:0,gwr:'',up:0,val:'',bank:''};const sl='<span class="sl">•</span>';
  const top=`<span class="pill ptop"><span class="k">GW</span><b>${GWNO}</b>${sl}<b class="${gwCol(s.gw,s.avg)}">${s.gw}</b><span class="mu">/${s.avg}</span>${sl}<b class="gd">${s.ml}</b> <span class="${(s.gap+'')[0]==='+'?'gd':'bd'}">${s.gap}</span>${sl}<span class="k">GWR</span><b>${s.gwr}</b> <span class="${s.up?'gd':'bd'}">${s.up?'▲':'▼'}</span></span>`;
  const bot=`<span class="pill pbot"><span class="k">OP</span><b>${s.op}</b>${sl}<span class="k">OR</span><b>${s.ovr}</b> <span class="${s.ovrUp?'gd':'bd'}">${s.ovrUp?'▲':'▼'}</span>${sl}<b>${s.val}</b><span class="mu"> +${s.bank}</span></span>`;
  return top+bot;}
function splitLine(a){return a.length<=3?[a]:[a.slice(0,Math.ceil(a.length/2)),a.slice(Math.ceil(a.length/2))];}
function renderPitch(team){
  VIEWING=team;
  const sq=squadFor(team), st=sq.filter(p=>!p[7]), benchArr=sq.filter(p=>p[7]);
  const subrows=[];[1,2,3,4].forEach(t=>{const l=st.filter(p=>p[0]===t);if(l.length)splitLine(l).forEach(r=>subrows.push(r));});  // lines of >3 → two staggered sub-rows
  const rowW=a=>a.reduce((s,p)=>s+tileW(p[3]),0)+(a.length-1)*GAP;
  const pr=document.getElementById('pitchrows');
  const avail=(pr.clientWidth||340)-2;
  const SC=Math.min(1, avail/Math.max(...subrows.map(rowW),1));               // starters scale off their own ≤3 rows → bigger tiles
  const BSC=Math.min(SC, (avail-6)/(benchArr.length?rowW(benchArr):1));        // bench keeps all 4 in one row, never bigger than starters
  pr.innerHTML=subrows.map(r=>`<div class="prow">${r.map(p=>bub(p,SC)).join('')}</div>`).join('');
  document.getElementById('bench').innerHTML=benchArr.map(p=>bub(p,BSC,TILEH*SC,true)).join('');  // bench: width scaled to fit 4, full height, xPts on its own 4th line
  document.getElementById('gwpill').innerHTML=gwPill(team);
  document.getElementById('whoName').textContent=team;
  document.getElementById('whoBack').classList.toggle('hidden',team===ME);
}
function flash(el){el.classList.remove('flash');void el.offsetWidth;el.classList.add('flash');setTimeout(()=>el.classList.remove('flash'),1300);}
function viewTeam(team){renderPitch(team);const c=document.getElementById('card-squad');c.scrollIntoView({behavior:'smooth',block:'start'});flash(c);}
function backHome(){viewTeam(ME);}

/* league table — rank,team,manager,captain,chipNow,chipsUsed[[name,count]],overallRank,gwPts,total,gap,xPts,xGI,isMe */
const PERSON='<svg class="icn" viewBox="0 0 24 24" fill="currentColor"><circle cx="12" cy="8" r="4"/><path d="M4 21a8 8 0 0 1 16 0z"/></svg>';
const gwTier=v=>v<25?'red':v<45?'gold':v<=50?'green':'purple';
const xpC=v=>v>=50?'g':v>=42?'a':'r';
const chipList=a=>(a||[]).map(([c,n])=>`<span class="${n>=2?'cu2':'cu1'}">${c}</span>`).join(' ');
function renderLeague(LG){document.getElementById('lgtable').innerHTML=
`<thead><tr><th>Team</th><th class="r">GW Pts</th><th class="r">Total</th><th class="r">xPts</th><th class="r">xGI</th></tr></thead><tbody>`+
(LG||[]).map(r=>{const me=r[12];return `<tr class="${me?'me':''}">
<td><div><span class="rk">${r[0]}</span> <span class="lname ${me?'lme':''}" onclick="viewTeam('${r[1].replace(/'/g,"\\'")}')">${r[1]}</span>${me?PERSON:''}${r[4]?`<span class="chipnow">${r[4]}</span>`:''}</div>
<div class="lsub">${r[2]} · ${r[3]}</div>
<div class="lsub2">${chipList(r[5])} · ${r[6]}</div></td>
<td class="r"><span class="gwbox ${gwTier(r[7])}">${r[7]}</span></td>
<td class="r"><b>${r[8]}</b>${r[9]?`<span class="gap">+${r[9]}</span>`:''}</td>
<td class="r"><span class="xv ${xpC(r[10])}">${r[10]}</span></td>
<td class="r"><span class="xv ${r[11]>=0.45?'g':'r'}">${(+r[11]).toFixed(1)}</span></td></tr>`}).join('')+`</tbody>`;}

/* nav: no toggle. default = myteam (cards: squad, league). mid = next-card / home */
const VIEW_ORDER=[["title","Title Odds"],["xg","xG"],["model","Model"],["stats","Stats"],["captain","Captain"],["thisgw","This GW"]];
const REAL=new Set(["title","xg"]);  // views with a real panel (others toast as placeholders)
const BURGER=VIEW_ORDER.map(v=>v[0]); let activeView="myteam";
const ICON_CHEV='<svg viewBox="0 0 24 24" width="26" height="26" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><path d="M6 10l6 6 6-6"/></svg>';
const ICON_HOME='<svg viewBox="0 0 24 24" width="23" height="23" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 11.5 12 4l9 7.5"/><path d="M5.5 10.5V20h13v-9.5"/></svg>';
function updateMid(){const b=document.getElementById('bbMid');const c=activeView==="myteam";b.innerHTML=c?ICON_CHEV:ICON_HOME;b.title=c?"Next card":"Home";}
function selectView(v){activeView=v;
  document.getElementById('myteam').style.display=v==="myteam"?"":"none";
  document.getElementById('titleview').style.display=v==="title"?"":"none";
  document.getElementById('xgview').style.display=v==="xg"?"":"none";
  if(v==="title")renderTitle();
  if(v==="xg")renderXG();
  renderTabSheet();closeSheets();updateMid();
  if(v!=="myteam"&&!REAL.has(v))toast(VIEW_ORDER.find(x=>x[0]===v)[1]+" — placeholder");
  window.scrollTo({top:0,behavior:'smooth'});}
let TITLE=null;
const tpct=v=>v>=0.05?v.toFixed(0)+'%':'—';
function renderTitle(){const el=document.getElementById('titlebody');
  if(!TITLE){el.innerHTML='<div class="tsub">Loading…</div>';
    fetch('titleodds.json',{cache:'no-store'}).then(r=>r.json()).then(d=>{TITLE=d;renderTitle();})
      .catch(()=>{el.innerHTML='<div class="tsub">Title odds unavailable — run the model to generate titleodds.json.</div>';});return;}
  const t=TITLE.teams||[], mx=Math.max(...t.map(x=>x.title),1), cont=t.filter(x=>x.title>=0.1);
  let html=`<div class="tsub">Each club's chance to <b>win the league</b> from ${(+TITLE.sims).toLocaleString()} simulated seasons — Dixon–Coles + Elo. Recalculates as results come in.</div>`;
  html+=cont.map((r,i)=>`<div class="orow"><div class="trk">${i+1}</div>
    <div style="flex:1;min-width:0"><div class="tnm">${logo(r.code,'lg')}${r.code}</div>
      <div class="obar"><i style="width:${Math.max(2,Math.round(r.title/mx*100))}%"></i></div>
      <div class="tmeta">top 4 ${r.top4}% · rel ${r.releg}%</div></div>
    <div class="tpct"><b>${r.title.toFixed(1)}%</b><span>title</span></div></div>`).join('');
  html+=`<div class="ctitle2">Projected final table</div>
    <div class="lgcard"><table class="ttab"><thead><tr><th>#</th><th>Team</th><th class="r">Pts</th><th class="r">GD</th><th class="r">Title</th><th class="r">Top 4</th><th class="r">Rel</th></tr></thead><tbody>`+
    t.map(r=>`<tr class="${r.rank<=4?'t4':r.rank>=18?'relrow':''}"><td class="trk2">${r.rank}</td><td class="ttm">${logo(r.code)}${r.code}</td>
      <td class="r"><b>${r.pts}</b></td><td class="r ${r.gd>=0?'g':'rd'}">${r.gd>0?'+':''}${r.gd}</td>
      <td class="r">${tpct(r.title)}</td><td class="r">${tpct(r.top4)}</td><td class="r">${tpct(r.releg)}</td></tr>`).join('')+
    `</tbody></table></div>
    <div class="tnote">Trained through ${TITLE.trained_through}. Promoted sides are modelled off older top-flight form until live results accrue.</div>`;
  el.innerHTML=html;}

/* ===== xG page (mirrors WC26) ===== */
const code3=t=>t;                              // FPL identifiers are already 3-letter codes
const flagImg=(t,sm)=>logo(t,sm?'':'lg');      // badge stand-in for WC26's flag
const xgEliminated=()=>new Set();              // no knockouts in a league
let XG=null, xgMode="xg", xgView="bars", xgCutoff=null, xgFocus="";
function xgPlayed(){return XG&&XG.games?[...XG.games].sort((a,b)=>a.gw-b.gw):[];}
function xgMaxGames(){const g=xgPlayed(),c={};g.forEach(f=>{c[f.h]=(c[f.h]||0)+1;c[f.a]=(c[f.a]||0)+1;});return Math.max(1,...Object.values(c),1);}
function xgRows(cap){const g=xgPlayed(),teams={},cnt={};
  g.forEach(f=>{[[f.h,f.gh,f.ga,f.xh,f.xa],[f.a,f.ga,f.gh,f.xa,f.xh]].forEach(([t,gf,ga,xf,xa])=>{
    cnt[t]=(cnt[t]||0)+1; if(cap!=null&&cnt[t]>cap)return;
    const o=teams[t]||(teams[t]={gp:0,gf:0,ga:0,xf:0,xa:0});o.gp++;o.gf+=gf;o.ga+=ga;o.xf+=xf;o.xa+=xa;});});
  return Object.entries(teams).map(([t,o])=>{const xf=Math.round(o.xf*100)/100,xa=Math.round(o.xa*100)/100,xgd=Math.round((o.xf-o.xa)*100)/100,gd=o.gf-o.ga;
    return {t,gp:o.gp,gf:o.gf,ga:o.ga,xf,xa,xgd,gd,luck:Math.round((gd-xgd)*100)/100};});}
function renderXG(){const host=document.getElementById('xg');
  if(!XG){host.innerHTML='<div class="err">Loading…</div>';
    fetch('xg.json',{cache:'no-store'}).then(r=>r.json()).then(d=>{XG=d;renderXG();}).catch(()=>{host.innerHTML='<div class="err">xG data unavailable.</div>';});return;}
  const g=xgPlayed();
  if(!g.length){host.innerHTML='<div class="err">No games played yet — the xG view fills in automatically once the season kicks off.</div>';return;}
  const maxG=xgMaxGames(); if(xgCutoff==null||xgCutoff>maxG)xgCutoff=maxG;
  const views=[["bars","Bars"],["map","Map"],["luck","Luck"],["finish","Finishing"]];
  const vt=`<div class="oddsel" style="margin-top:4px">`+views.map(([k,l])=>`<span class="opt ${xgView===k?'on':''}" onclick="xgView='${k}';renderXG()">${l}</span>`).join("")+`</div>`;
  const allT=[...new Set(g.flatMap(f=>[f.h,f.a]))].sort();
  const sel=`<select class="xgsel" onchange="xgFocus=this.value;refreshXGChart()"><option value="">Find a team…</option>${allT.map(t=>`<option value="${t}" ${t===xgFocus?'selected':''}>${t}</option>`).join("")}</select>`;
  const reset=`<button class="xgreset" onclick="xgFocus='';xgCutoff=null;renderXG()" title="Reset" aria-label="Reset"><svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 11a9 9 0 0 1 15-5l3 3M21 13a9 9 0 0 1-15 5l-3-3"/><path d="M21 4v5h-5M3 20v-5h5"/></svg></button>`;
  const slider=maxG>1?`<div class="xgslide"><span class="m" id="xgcut"></span><input type="range" min="1" max="${maxG}" value="${xgCutoff}" oninput="xgCutoff=+this.value;refreshXGChart()"></div>`:"";
  host.innerHTML=vt+`<div class="xgctl">${sel}${reset}</div><div id="xgchart"></div>${slider}`;
  refreshXGChart();}
function refreshXGChart(){const el=document.getElementById("xgchart");if(!el)return;
  const rows=xgRows(xgCutoff);
  const cut=document.getElementById("xgcut");if(cut)cut.textContent=xgCutoff>=xgMaxGames()?"All games":"thru GW"+xgCutoff;
  if(xgView!=="bars"){el.innerHTML=xgChart(rows,xgView,xgFocus,xgEliminated())+`<div id="xgdetail" class="xgdetail"></div>`;if(xgFocus)xgPoint(xgFocus);return;}
  const metric=r=>xgMode==="luck"?r.luck:r.xgd;
  rows.sort((a,b)=>metric(b)-metric(a));
  const maxAbs=Math.max(0.1,...rows.map(r=>Math.abs(metric(r))));
  const sub=`<div class="oddsel" style="margin-top:6px"><span class="opt ${xgMode==='xg'?'on':''}" onclick="xgMode='xg';refreshXGChart()">By xG</span><span class="opt ${xgMode==='luck'?'on':''}" onclick="xgMode='luck';refreshXGChart()">By luck</span></div>`;
  const lbl=xgMode==="luck"?"vs xG":"net xG";
  const hdr=`<div class="xgrow2 xg-head"><span>team</span><span>goals</span><span>xG</span><span></span><span style="text-align:right">${lbl}</span></div>`;
  const bars=rows.map(r=>{const v=metric(r),up=v>=0,w=Math.min(50,Math.abs(v)/maxAbs*50),c=v>0.05?'var(--good)':v<-0.05?'var(--bad)':'var(--muted)',dim=xgFocus&&r.t!==xgFocus;
    return `<div class="xgrow2" style="${dim?'opacity:.3':r.t===xgFocus?'background:rgba(0,255,133,.12);border-radius:6px':''}">
      <span class="xg-team">${logo(r.t)}${r.t}</span>
      <span class="xg-d">${r.gf}–${r.ga}</span>
      <span class="xg-d">${r.xf.toFixed(1)}–${r.xa.toFixed(1)}</span>
      <div class="xg-bar"><span class="xg-mid"></span><span class="xg-fill" style="${up?'left:50%':'right:50%'};width:${w.toFixed(1)}%;background:${c}"></span></div>
      <span class="xg-val" style="color:${c}">${v>0?'+':''}${v.toFixed(2)}</span></div>`;}).join("");
  el.innerHTML=sub+hdr+`<div>${bars}</div>`;}
function scatterSVG(items,cfg){
  const W=340,H=306,ml=30,mr=12,mt=14,mb=38,pw=W-ml-mr,ph=H-mt-mb;
  const sx=v=>ml+(v-cfg.xmin)/(cfg.xmax-cfg.xmin)*pw;
  const sy=v=>cfg.flipY?mt+(v-cfg.ymin)/(cfg.ymax-cfg.ymin)*ph:mt+(cfg.ymax-v)/(cfg.ymax-cfg.ymin)*ph;
  let s=`<svg viewBox="0 0 ${W} ${H}" width="100%" role="img" aria-label="${cfg.aria||'xG scatter'}">`;
  (cfg.zones||[]).forEach(z=>{const xa=sx(z.x0),xb=sx(z.x1),ya=sy(z.y0),yb=sy(z.y1);s+=`<rect x="${Math.min(xa,xb).toFixed(1)}" y="${Math.min(ya,yb).toFixed(1)}" width="${Math.abs(xb-xa).toFixed(1)}" height="${Math.abs(yb-ya).toFixed(1)}" fill="${z.fill}"/>`;});
  (cfg.tris||[]).forEach(t=>{s+=`<polygon points="${t.pts.map(([a,b])=>`${sx(a).toFixed(1)},${sy(b).toFixed(1)}`).join(" ")}" fill="${t.fill}"/>`;});
  for(let q=Math.ceil(cfg.xmin);q<=Math.floor(cfg.xmax);q++){s+=`<line x1="${sx(q).toFixed(1)}" y1="${mt}" x2="${sx(q).toFixed(1)}" y2="${H-mb}" stroke="${q===0&&cfg.xmin<0?'#3a3a55':'#1b1b2b'}"/><text x="${sx(q).toFixed(1)}" y="${H-mb+13}" fill="#5b5b70" font-size="11" text-anchor="middle">${q}</text>`;}
  for(let q=Math.ceil(cfg.ymin);q<=Math.floor(cfg.ymax);q++){s+=`<line x1="${ml}" y1="${sy(q).toFixed(1)}" x2="${W-mr}" y2="${sy(q).toFixed(1)}" stroke="${q===0&&cfg.ymin<0?'#3a3a55':'#1b1b2b'}"/><text x="${ml-4}" y="${(sy(q)+3).toFixed(1)}" fill="#5b5b70" font-size="11" text-anchor="end">${q}</text>`;}
  if(cfg.diag){const a=Math.max(cfg.xmin,cfg.ymin),b=Math.min(cfg.xmax,cfg.ymax);s+=`<line x1="${sx(a).toFixed(1)}" y1="${sy(a).toFixed(1)}" x2="${sx(b).toFixed(1)}" y2="${sy(b).toFixed(1)}" stroke="#55557a" stroke-dasharray="3 3"/>`;}
  (cfg.notes||[]).forEach(n=>{s+=`<text x="${sx(n.x).toFixed(1)}" y="${sy(n.y).toFixed(1)}" fill="${n.col}" font-size="11" font-weight="600" text-anchor="${n.anchor||'start'}">${n.t}</text>`;});
  items.forEach(it=>{const X=sx(it.x),Y=sy(it.y);
    if(it.ring)s+=`<circle cx="${X.toFixed(1)}" cy="${Y.toFixed(1)}" r="9" fill="none" stroke="#00ff85" stroke-width="2"/>`;
    const r=it.big?6:3,op=it.dim?0.5:it.big?0.92:0.42;
    s+=`<circle cx="${X.toFixed(1)}" cy="${Y.toFixed(1)}" r="${r}" fill="${it.col}" fill-opacity="${op}" style="cursor:pointer" onclick="xgPoint('${it.code}')"/>`;});
  const placed=[],ov=(a,b)=>a[0]<b[0]+b[2]&&a[0]+a[2]>b[0]&&a[1]<b[1]+b[3]&&a[1]+a[3]>b[1];
  const cands=[[8,3.5,'start'],[8,-8,'start'],[-8,3.5,'end'],[8,15,'start'],[8,-15,'start'],[-8,-8,'end'],[-8,15,'end']];
  items.filter(it=>it.big).forEach(it=>{const X=sx(it.x),Y=sy(it.y),w=it.code.length*6.6+3,h=12;let ch=cands[0];
    for(let ci=0;ci<cands.length;ci++){const c=cands[ci],lx=X+c[0],ly=Y+c[1],bx=c[2]==='end'?lx-w:lx,box=[bx,ly-h+2,w,h];
      if(!placed.some(p=>ov(p,box))){ch=c;placed.push(box);break;}
      if(ci===cands.length-1){const bx0=ch[2]==='end'?X+ch[0]-w:X+ch[0];placed.push([bx0,Y+ch[1]-h+2,w,h]);}}
    s+=`<text x="${(X+ch[0]).toFixed(1)}" y="${(Y+ch[1]).toFixed(1)}" fill="${it.dim?'#7a7a90':'#e8e8f2'}" font-size="11" font-weight="600" text-anchor="${ch[2]}" style="cursor:pointer" onclick="xgPoint('${it.code}')">${it.code}</text>`;});
  s+=`<text x="${(ml+pw/2).toFixed(1)}" y="${H-8}" fill="#8a8aa0" font-size="11" text-anchor="middle">${cfg.xlab}</text>`;
  s+=`<text transform="translate(11,${mt+2}) rotate(-90)" fill="#8a8aa0" font-size="11" text-anchor="end">${cfg.ylab}</text>`;
  return `<div style="margin-top:8px">${s}</svg></div>`;}
function xgChart(rows,view,focus,elim){
  const avg=a=>a.reduce((x,y)=>x+y,0)/a.length;
  const colNet=n=>n>=1.5?'#1d9e75':n>=0.5?'#5dcaa5':n>-0.5?'#9a9aae':n>-1.5?'#ef9f27':'#e24b4a';
  const colDiff=d=>d>0.4?'#1d9e75':d<-0.4?'#e24b4a':'#9a9aae';
  const k=Math.max(1,Math.round(rows.length*0.1));
  const pick=acc=>{const srt=[...rows].sort((a,b)=>acc(b)-acc(a));return new Set([...srt.slice(0,k),...srt.slice(-k)].map(r=>r.t));};
  let items,cfg;
  if(view==="map"){
    const xf=r=>r.xf/r.gp,ya=r=>r.xa/r.gp,net=r=>xf(r)-ya(r);
    const xmax=Math.max(2,Math.ceil(Math.max(...rows.map(xf))+0.2)),ymax=Math.max(2,Math.ceil(Math.max(...rows.map(ya))+0.2));
    const lab=pick(net),mxf=avg(rows.map(xf)),mxa=avg(rows.map(ya));
    items=rows.map(r=>({x:xf(r),y:ya(r),code:r.t,team:r.t,big:lab.has(r.t),col:colNet(net(r))}));
    cfg={xmin:0,xmax,ymin:0,ymax,flipY:true,diag:false,xlab:"xG created →",ylab:"← xG conceded",aria:"attack vs defence",
      zones:[{x0:mxf,x1:xmax,y0:0,y1:mxa,fill:'rgba(29,158,117,.08)'},{x0:0,x1:mxf,y0:mxa,y1:ymax,fill:'rgba(226,75,74,.08)'}],
      notes:[{x:xmax-0.06,y:0.2,t:'dominant',col:'#5dcaa5',anchor:'end'},{x:0.06,y:ymax-0.1,t:'outclassed',col:'#ef9f27',anchor:'start'}]};
  }else if(view==="luck"){
    const xd=r=>(r.xf-r.xa)/r.gp,yd=r=>(r.gf-r.ga)/r.gp,luck=r=>yd(r)-xd(r);
    const m=Math.max(1,Math.ceil(Math.max(...rows.map(r=>Math.max(Math.abs(xd(r)),Math.abs(yd(r)))))+0.2));
    const lab=pick(luck);
    items=rows.map(r=>({x:xd(r),y:yd(r),code:r.t,team:r.t,big:lab.has(r.t),col:colDiff(-luck(r))}));
    cfg={xmin:-m,xmax:m,ymin:-m,ymax:m,flipY:false,diag:true,xlab:"xG diff →",ylab:"goal diff ↑",aria:"over/under-performance vs xG",
      tris:[{pts:[[-m,m],[-m,-m],[m,m]],fill:'rgba(226,75,74,.07)'},{pts:[[m,-m],[-m,-m],[m,m]],fill:'rgba(29,158,117,.07)'}],
      notes:[{x:-m+0.12,y:m-0.18,t:'overperforming',col:'#ef9f27',anchor:'start'},{x:m-0.12,y:-m+0.35,t:'underperforming',col:'#5dcaa5',anchor:'end'}]};
  }else{
    const xf=r=>r.xf/r.gp,gf=r=>r.gf/r.gp,fin=r=>gf(r)-xf(r);
    const mx=Math.max(2,Math.ceil(Math.max(...rows.map(xf),...rows.map(gf))+0.2));
    const lab=pick(fin);
    items=rows.map(r=>({x:xf(r),y:gf(r),code:r.t,team:r.t,big:lab.has(r.t),col:colDiff(-fin(r))}));
    cfg={xmin:0,xmax:mx,ymin:0,ymax:mx,flipY:false,diag:true,xlab:"xG created →",ylab:"goals scored ↑",aria:"finishing efficiency",
      tris:[{pts:[[0,mx],[0,0],[mx,mx]],fill:'rgba(226,75,74,.07)'},{pts:[[mx,0],[0,0],[mx,mx]],fill:'rgba(29,158,117,.07)'}],
      notes:[{x:0.12,y:mx-0.18,t:'clinical',col:'#ef9f27',anchor:'start'},{x:mx-0.12,y:0.35,t:'wasteful',col:'#5dcaa5',anchor:'end'}]};
  }
  if(focus){items.forEach(it=>{const f=it.team===focus;it.big=f;it.ring=f;if(!f){it.col='#3a3a52';it.dim=true;}});}
  return scatterSVG(items,cfg);}
function xgGameLabel(gd,xgd){const dom=gd===0?0.7:0.5;let t;
  if(gd>0)t=xgd>=0.5?'deserved win':xgd<=-0.5?'smash & grab':'won a tight one';
  else if(gd===0)t=xgd>=0.7?'dominated, drew':xgd<=-0.7?'stole a point':'fair draw';
  else t=xgd>=0.7?'unlucky loss':xgd<=-0.7?'outplayed':'edged out';
  const c=xgd>=dom?'var(--good)':xgd<=-dom?'var(--bad)':'var(--muted)';
  return `<span style="color:${c};font-weight:600">${t}</span>`;}
function xgContextNote(ew,gd){if(ew==null)return"";const pct=Math.round(ew*100);
  if(ew>=0.6)return(gd<=0?"should've won · ":"won as expected · ")+`fav ${pct}%`;
  if(ew<=0.30)return(gd>=0?"punched up · ":"lost as expected · ")+`dog ${pct}%`;
  return `even matchup · ${pct}%`;}
function xgPoint(code){const el=document.getElementById("xgdetail");if(!el)return;
  const rows=xgRows(xgCutoff),r=rows.find(x=>x.t===code);if(!r)return;
  const team=r.t,avg=a=>a.reduce((p,q)=>p+q,0)/a.length;let zone,zc;
  if(xgView==="map"){const mxf=avg(rows.map(x=>x.xf/x.gp)),mxa=avg(rows.map(x=>x.xa/x.gp)),pf=r.xf/r.gp,pa=r.xa/r.gp;
    if(pf>=mxf&&pa<=mxa){zone="dominant";zc="var(--good)";}else if(pf<mxf&&pa>mxa){zone="outclassed";zc="var(--bad)";}
    else if(pf>=mxf&&pa>mxa){zone="busy both ends";zc="var(--muted)";}else{zone="quiet both ends";zc="var(--muted)";}}
  else if(xgView==="luck"){const l=r.luck;zone=l<-0.3?"underperforming":l>0.3?"overperforming":"as expected";zc=l<-0.3?"var(--good)":l>0.3?"var(--bad)":"var(--muted)";}
  else{const fd=r.gf-r.xf;zone=fd<-0.3?"wasteful":fd>0.3?"clinical":"as expected";zc=fd<-0.3?"var(--good)":fd>0.3?"var(--bad)":"var(--muted)";}
  const gs=xgPlayed().filter(f=>f.h===team||f.a===team).slice(0,xgCutoff||99);
  const G=gs.map(f=>{const home=team===f.h,opp=home?f.a:f.h;
    const gf=home?f.gh:f.ga,ga=home?f.ga:f.gh;
    const xgd=Math.round(((home?f.xh:f.xa)-(home?f.xa:f.xh))*100)/100,gd=gf-ga;
    const ew=home?f.ph:f.pa,dom=gd===0?0.7:0.5;
    return {gw:f.gw,opp,gf,ga,xgd,gd,ew,sig:xgd>=dom?'back':xgd<=-dom?'fade':'even'};});
  const head=`<div class="xgg xgg-head"><span style="text-align:center">GW</span><span>Opp</span><span style="text-align:center">Score</span><span style="text-align:center">Net xG</span><span style="text-align:right">Remarks</span></div>`;
  const games=G.map(g=>{const note=xgContextNote(g.ew,g.gd);
    return `<div class="xggrow"><div class="xgg"><span class="xgg-gw">${g.gw}</span><span class="xgg-o">${logo(g.opp)}${g.opp}</span><span class="xgg-s">${g.gf}–${g.ga}</span><span class="xgg-n">${g.xgd>0?'+':''}${g.xgd.toFixed(1)}</span><span class="xgg-l">${xgGameLabel(g.gd,g.xgd)}</span></div>${note?`<div class="xgg-ctx">${note}</div>`:''}</div>`;}).join("");
  let summary="";
  if(G.length>=2){const n=G.length,back=G.filter(g=>g.sig==='back').length,fade=G.filter(g=>g.sig==='fade').length;
    const vsStr=G.filter(g=>g.sig==='back'&&g.ew!=null&&g.ew<=0.30).length,need=Math.ceil(n*0.6);let verd,vc;
    if(back>=need&&fade<=1){verd="consistent under-performer — back";vc="var(--good)";}
    else if(fade>=need&&back<=1){verd="riding its luck — fade";vc="var(--bad)";}
    else{verd="results match the level — no clear edge";vc="var(--muted)";}
    summary=`<div class="xgd-sum"><span class="m">out-created ${back} of ${n}${fade?`, ${fade} against`:''}${vsStr?` · ${vsStr} vs stronger`:''} → </span><b style="color:${vc}">${verd}</b></div>`;}
  el.innerHTML=`<div class="xgd-h">${logo(team,'lg')}<b style="color:var(--ink)">${team}</b> · <b style="color:${zc}">${zone}</b> <span class="tm">· ${r.gp} game${r.gp>1?'s':''}</span></div>${summary}${head}${games}`;}
const CARDS=["card-squad","card-league"];let _ci=0;
function midAction(){ if(activeView!=="myteam"){selectView("myteam");return;}
  _ci=(_ci+1)%CARDS.length; const el=document.getElementById(CARDS[_ci]);
  el.scrollIntoView({behavior:'smooth',block:'center'});
  el.classList.remove('flash');void el.offsetWidth;el.classList.add('flash');setTimeout(()=>el.classList.remove('flash'),1300);}
function renderTabSheet(){document.getElementById('sheetTabs').innerHTML=VIEW_ORDER.map(([id,l])=>`<div class="tabrow ${activeView===id?'on':''}" onclick="selectView('${id}')">${l}</div>`).join('');}
function toggleSheet(w,e){if(e)e.stopPropagation();const a=document.getElementById('sheetActions'),t=document.getElementById('sheetTabs');const tg=w==="actions"?a:t,o=w==="actions"?t:a;o.classList.add('hidden');tg.classList.toggle('hidden');}
function closeSheets(){document.getElementById('sheetActions').classList.add('hidden');document.getElementById('sheetTabs').classList.add('hidden');}
function barAction(a,e){if(e)e.stopPropagation();closeSheets();toast(a==='rebuild'?'Rebuilding projections…':a==='export'?'Exported':'Copied for Claude');}
function toast(t){const el=document.getElementById('bbtoast');el.textContent=t;el.classList.add('show');setTimeout(()=>el.classList.remove('show'),1300);}
document.addEventListener('click',e=>{if(!e.target.closest('.bsheet,.bottombar,.bbhit'))closeSheets();});
renderTabSheet();updateMid();

/* ===== live data ===== */
fetch('v2.json',{cache:'no-store'}).then(r=>r.json()).then(V=>{
  SQUADS=V.squads||{}; STATS=V.stats||{}; ME=V.me||'wirtzplay'; GWNO=V.event||0; VIEWING=ME;
  MYNAMES=new Set((SQUADS[ME]||[]).map(p=>p[1]));
  try{
    const d=new Date(V.generated.replace(' ','T').replace(' UTC','')+':00Z');
    document.getElementById('updatedTime').textContent=d.toLocaleString('en-SG',{timeZone:'Asia/Singapore',weekday:'short',day:'numeric',month:'short',hour:'2-digit',minute:'2-digit',hour12:false})+' SGT';
  }catch(e){document.getElementById('updatedTime').textContent=V.generated;}
  renderPitch(ME);
  renderLeague(V.league);
}).catch(e=>{
  document.getElementById('pitchrows').innerHTML='<div style="padding:30px 16px;text-align:center;color:var(--bad)">Couldn\'t load live data (v2.json).</div>';
  document.getElementById('updatedTime').textContent='—';
});
