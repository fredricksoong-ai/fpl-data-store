<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="theme-color" content="#0b1220">
<title>Default page — My Team + League</title>
<style>
  :root{
    --bg:#0b1220;--card:#121c2e;--card2:#0f1827;--line:#1f2c44;--ink:#e8eef7;--muted:#90a0b8;--faint:#647089;
    --good:#34d399;--away:#f59e0b;--bad:#f87171;--pick:#a78bfa;--fpl:#00ff85;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  body{background:var(--bg);color:var(--ink);font:14px/1.45 -apple-system,BlinkMacSystemFont,"Segoe UI",Inter,Roboto,sans-serif;-webkit-font-smoothing:antialiased;padding:env(safe-area-inset-top) 0 0;touch-action:manipulation}
  .wrap{max-width:560px;margin:0 auto;padding:0 14px}
  .hidden{display:none}

  /* header */
  header{padding:14px 0 2px}
  .hrow{display:flex;align-items:center;gap:8px}
  h1{font-size:19px;font-weight:800;letter-spacing:.2px;flex:1;min-width:0;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .hright{flex:none;display:flex;align-items:center;gap:8px}
  .hcd{flex:none;font-size:12px;font-weight:700;color:var(--ink);white-space:nowrap;cursor:pointer}
  .pillrow{display:flex;gap:7px;flex-wrap:wrap;margin-top:11px}
  .pill{background:var(--card);border:1px solid var(--line);border-radius:999px;padding:6px 12px;font-size:12.5px;color:var(--muted);white-space:nowrap;font-variant-numeric:tabular-nums}
  .pill .k{color:var(--faint);font-weight:600;margin-right:5px;font-size:11px;text-transform:uppercase;letter-spacing:.3px}
  .pill b{color:var(--ink);font-weight:800}
  .pill.mut,.pill.mut .k{color:var(--faint)} .pill.mut b{color:var(--muted);font-weight:700}
  .mu{color:var(--muted);font-weight:600}
  .am{color:var(--away)!important}.gd{color:var(--good)!important}.bd{color:var(--bad)!important}.pk{color:var(--pick)!important}
  .sl{color:var(--faint);margin:0 5px}
  .updated{font-size:11px;color:var(--faint);margin-top:11px}.updated b{color:var(--muted);font-weight:600}

  main{padding:10px 0 78px}
  .card{scroll-margin-top:12px;margin:10px 0}
  .ctitle{font-size:11px;font-weight:700;letter-spacing:.5px;text-transform:uppercase;color:var(--faint);margin:0 4px 8px;display:flex;align-items:center;gap:8px}
  .ctitle::after{content:"";flex:1;height:1px;background:var(--line)}
  .flash{animation:fl 1.2s ease-out}
  @keyframes fl{0%{box-shadow:0 0 0 2px var(--fpl),0 0 16px rgba(0,255,133,.4)}100%{box-shadow:0 0 0 0 rgba(0,255,133,0)}}

  /* legend + pitch */
  .legend{flex:1;display:flex;justify-content:center;flex-wrap:wrap;gap:8px;align-items:center;font-size:8.5px;color:var(--muted)}
  .lg.dnp{color:var(--faint)} .ld.dnpd{background:repeating-linear-gradient(45deg,currentColor,currentColor 1.5px,transparent 1.5px,transparent 3px)}
  .lg{display:inline-flex;align-items:center;gap:4px;white-space:nowrap}
  .ld{width:8px;height:8px;border-radius:50%;border:1.5px solid currentColor;flex:none}
  .gkrow{display:flex;align-items:center;justify-content:space-between;gap:6px}
  .gkstats{flex:1;min-width:0;font-size:10.5px;color:var(--muted);line-height:1.3}
  .gkstats.l{text-align:right;padding-right:4px} .gkstats.r{text-align:left;padding-left:4px}
  .gkstats b{color:var(--ink);font-weight:800} .gk-s{font-size:9px;letter-spacing:.3px;color:var(--faint);text-transform:uppercase} .gk-m{color:var(--faint)}
  .lg.yet{color:var(--faint)}.lg.red{color:var(--bad)}.lg.gold{color:#e0b53a}.lg.green{color:var(--good)}.lg.purple{color:var(--pick)}
  .pitch{position:relative;border:1px solid var(--line);border-radius:18px;padding:12px 8px 14px;overflow:hidden;background:radial-gradient(120% 80% at 50% -10%,rgba(0,255,133,.05),transparent 55%),var(--card2)}
  .pitch::before{content:"";position:absolute;left:8%;right:8%;top:46%;height:1px;background:rgba(255,255,255,.05)}
  .pitch::after{content:"";position:absolute;left:50%;top:48%;width:110px;height:110px;border:1px solid rgba(255,255,255,.05);border-radius:50%;transform:translate(-50%,-50%)}
  .prow{display:flex;justify-content:center;align-items:center;gap:6px;margin:5px 0}
  .bub{position:relative;display:flex;align-items:center;justify-content:center;border-radius:11px;text-align:center;flex:none;padding:0 4px}
  .bub .in{display:flex;flex-direction:column;align-items:center;gap:2px;line-height:1.05;max-width:100%;padding:0 1px}
  .bub .nm{font-weight:700;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;word-break:normal;overflow-wrap:normal;line-height:1.06;max-width:100%}
  .bub .sub{font-weight:600;opacity:.82;white-space:nowrap}
  .bub.dnp{background:repeating-linear-gradient(45deg,rgba(255,255,255,.03),rgba(255,255,255,.03) 5px,rgba(255,255,255,.085) 5px,rgba(255,255,255,.085) 10px);border:2px solid rgba(255,255,255,.16);color:var(--muted)}
  .bub.yet{background:rgba(255,255,255,.03);border:2px solid rgba(255,255,255,.22);color:var(--muted)}
  .bub.red{background:rgba(248,113,113,.15);border:2px solid var(--bad);color:#fca5a5}
  .bub.gold{background:rgba(224,181,58,.15);border:2px solid #cda227;color:#f3d785}
  .bub.green{background:rgba(52,211,153,.16);border:2px solid var(--good);color:#82edc0}
  .bub.purple{background:rgba(167,139,250,.18);border:2px solid var(--pick);color:#c9bcfa}
  .bub.vc{border-width:3px;border-color:rgba(255,255,255,.6)}
  .bub.cap{border-width:4px;border-color:rgba(255,255,255,.92)}
  .cnr{position:absolute;width:16px;height:16px;border-radius:50%;display:flex;align-items:center;justify-content:center;border:2px solid var(--card2);font-size:11px;font-weight:800;background:#f1f4f9;z-index:2;line-height:1}
  .cnr svg{display:block}
  .c-tr{top:-4px;right:-4px}.c-tl{top:-4px;left:-4px;z-index:2}.c-tl2{top:-4px;left:5px;z-index:3}.c-bl{bottom:-4px;left:-4px}.c-br{bottom:-4px;right:-4px}
  .b-cap{background:var(--fpl);color:#06231a}.b-vc{background:#86f3bf;color:#06231a}
  .b-icon{background:#0d1626;border-color:var(--card2)}
  .b-warn{background:var(--away);color:#3a2400;font-size:11px}
  .benchsep{height:1px;background:var(--line);margin:14px 12px 10px}
  .bench{display:flex;justify-content:center;gap:6px;flex-wrap:nowrap;padding:2px}.bench .bub{opacity:.85}

  /* league table */
  .lgcard{background:var(--card);border:1px solid var(--line);border-radius:14px;overflow-x:auto}
  table{width:100%;border-collapse:separate;border-spacing:0;font-size:13px;min-width:480px}
  th{background:var(--card2);color:var(--muted);font-size:11px;letter-spacing:.2px;font-weight:700;padding:8px 10px;text-align:left;border-bottom:1px solid var(--line)}
  th:first-child,td:first-child{position:sticky;left:0;z-index:2;background:var(--card);box-shadow:1px 0 0 var(--line);white-space:nowrap}
  th:first-child{background:var(--card2);z-index:3}
  tr.me td:first-child{background:#10261c}
  .cu1{font-weight:500;color:var(--faint)} .cu2{font-weight:800;color:var(--ink)}
  .backbtn{margin-left:auto;width:28px;height:28px;border-radius:8px;border:1px solid var(--line);background:var(--card2);color:var(--muted);display:flex;align-items:center;justify-content:center;cursor:pointer}
  .backbtn:active{transform:scale(.93);color:var(--fpl)} .backbtn svg{width:15px;height:15px}
  th.r,td.r{text-align:right} td{padding:9px 10px;border-bottom:1px solid var(--line);font-variant-numeric:tabular-nums}
  tr:last-child td{border-bottom:none}
  tr.me td{background:rgba(0,255,133,.08)}
  .rk{color:var(--muted);width:20px} .tm{font-weight:700} .mgr{color:var(--faint);font-weight:400;font-size:11px;margin-left:6px}
  .gwp{color:var(--good);font-weight:700}
  .pitch-top{display:flex;flex-direction:column;align-items:center;gap:5px;margin-bottom:7px}
  .pt-name{display:flex;align-items:baseline;justify-content:center;gap:5px;max-width:100%}
  #whoName{color:var(--muted);font-weight:700;font-size:13px;max-width:150px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  .who-val{color:var(--faint);font-size:11px;font-weight:600;white-space:nowrap}
  .gwpills{display:flex;flex-direction:column;align-items:center;gap:5px;width:100%}
  .gwpills .pill{white-space:nowrap;letter-spacing:-.1px}
  .gwpills .pill.ptop{padding:5px 12px;font-size:10.5px;border-color:rgba(0,255,133,.55);background:rgba(0,255,133,.07)}
  .gwpills .pill.pbot{padding:3px 11px;font-size:8.5px}
  .gwpills .pill b{font-weight:700} .gwpills .pill .sl{margin:0 3px}
  .pitch-bottom{display:flex;align-items:center;gap:8px;margin-top:10px}
  #whoBack{flex:none}
  .tm{cursor:pointer} tr:not(.me) .tm:active{color:var(--fpl)}
  .lsub{color:var(--faint);font-size:10.5px;margin-top:2px}
  .lchip{display:inline-block;margin-left:6px;background:rgba(0,255,133,.14);color:var(--fpl);border-radius:5px;padding:1px 5px;font-size:9.5px;font-weight:700;vertical-align:1px}
  .lname{font-weight:800;cursor:pointer} tr:not(.me) .lname:active{color:var(--fpl)}
  .lme{background:rgba(0,255,133,.16);color:var(--fpl);border-radius:7px;padding:1px 7px}
  .chipnow{display:inline-block;margin-left:7px;background:#0b1422;border:1px solid var(--line);border-radius:7px;padding:2px 7px;font-size:11px;font-weight:800;color:var(--ink);vertical-align:1px}
  .lsub{color:var(--muted);font-size:11px;margin-top:3px}
  .lsub2{color:var(--faint);font-size:10.5px;margin-top:2px}
  .gwbox{display:inline-flex;align-items:center;justify-content:center;width:36px;height:30px;border-radius:8px;font-weight:800;font-variant-numeric:tabular-nums}
  .gwbox.red{background:rgba(248,113,113,.18);color:#fca5a5}.gwbox.gold{background:rgba(224,181,58,.18);color:#f3d785}
  .gwbox.green{background:rgba(52,211,153,.2);color:#82edc0}.gwbox.purple{background:rgba(167,139,250,.22);color:#c9bcfa}
  .gap{color:var(--good);font-size:10px;font-weight:700;vertical-align:5px;margin-left:1px}
  .xv.g{color:var(--good)}.xv.a{color:var(--away)}.xv.r{color:var(--bad)}.xv{font-weight:700}
  .icn{width:13px;height:13px;vertical-align:-2px;margin-left:5px;opacity:.6}

  /* bottom bar (WC26) — accent swapped to FPL green */
  .bottombar{position:fixed;left:0;right:0;bottom:0;display:flex;align-items:flex-end;justify-content:space-around;gap:8px;padding:40px 26px 8px;padding-bottom:calc(8px + env(safe-area-inset-bottom));background:linear-gradient(to top,rgba(6,6,12,.9),rgba(6,6,12,.5) 42%,rgba(6,6,12,0));z-index:40;pointer-events:none}
  .bottombar .bbtn{pointer-events:auto}
  .bbtn{width:44px;height:44px;border-radius:50%;background:rgba(20,20,32,.5);backdrop-filter:blur(12px) saturate(150%);-webkit-backdrop-filter:blur(12px) saturate(150%);border:1px solid rgba(255,255,255,.16);color:var(--ink);cursor:pointer;display:flex;align-items:center;justify-content:center;line-height:0;font-family:inherit;box-shadow:0 3px 14px rgba(0,0,0,.45);-webkit-tap-highlight-color:transparent}
  .bbtn:active{transform:scale(.92)}.bbtn svg{display:block}
  .bbtn-mid{width:50px;height:50px;background:rgba(0,255,133,.45);border-color:rgba(0,255,133,.7);color:#04140c}
  .bbhit{position:fixed;bottom:0;height:74px;width:34%;z-index:39;pointer-events:auto}.bbhit-l{left:0}.bbhit-r{right:0}
  .bsheet{position:fixed;bottom:84px;z-index:45;background:var(--card2);border:1px solid var(--line);border-radius:14px;padding:6px;max-height:60vh;overflow:auto;box-shadow:0 10px 30px rgba(0,0,0,.45)}
  .bsheet-l{left:14px;width:204px}.bsheet-r{right:14px;width:182px}
  .brow{display:flex;align-items:center;gap:10px;padding:11px 10px;border-radius:9px;font-size:14px;cursor:pointer;color:var(--ink)}
  .brow:active{background:rgba(255,255,255,.06)}.brow .bic{width:20px;text-align:center;color:var(--fpl);font-size:16px}
  .tabrow{padding:11px 10px;border-radius:9px;font-size:14px;cursor:pointer;color:var(--ink)}
  .tabrow.on{background:rgba(0,255,133,.14);color:var(--fpl);font-weight:600}
  .bbtoast{position:fixed;left:50%;transform:translateX(-50%);bottom:88px;z-index:48;background:#1d2b22;border:1px solid var(--line);color:var(--ink);font-size:12px;padding:8px 14px;border-radius:10px;opacity:0;transition:opacity .25s;pointer-events:none}.bbtoast.show{opacity:1}
</style>
</head>
<body>
<header class="wrap">
  <div class="hrow"><h1>⚽️ FPLanner ⚽️</h1><span class="hright"><span id="oddsslot"></span><span id="nextcd" class="hcd"></span></span></div>
  <div class="updated">Last updated: <b id="updatedTime">…</b></div>
</header>

<main class="wrap" id="myteam">
  <section class="card" id="card-squad">
    <div class="pitch">
      <div class="pitch-top">
        <div class="pt-name"><span id="whoName">wirtzplay</span></div>
        <div id="gwpill" class="gwpills"></div>
      </div>
      <div id="pitchrows"></div>
      <div class="benchsep"></div>
      <div class="bench" id="bench"></div>
      <div class="pitch-bottom">
        <div class="legend">
          <span class="lg yet">Yet to play</span>
          <span class="lg dnp">DNP</span>
          <span class="lg red">0–3</span>
          <span class="lg gold">4–8</span>
          <span class="lg green">9–13</span>
          <span class="lg purple">14+</span>
        </div>
        <span id="whoBack" class="backbtn hidden" onclick="backHome()" title="Back to my team"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20 11a8 8 0 1 0-.5 4"/><path d="M20 4v5h-5"/></svg></span>
      </div>
    </div>
  </section>

  <section class="card" id="card-league">
    <div class="ctitle">Ballon d'FPL · mini-league</div>
    <div class="lgcard"><table id="lgtable"></table></div>
  </section>
  <div style="height:55vh" aria-hidden="true"></div>
</main>

<div id="bbtoast" class="bbtoast"></div>
<div id="sheetActions" class="bsheet bsheet-l hidden">
  <div class="brow" onclick="barAction('rebuild',event)"><span class="bic">↻</span>Rebuild</div>
  <div class="brow" onclick="barAction('export',event)"><span class="bic">⤒</span>Export</div>
  <div class="brow" onclick="barAction('copy',event)"><span class="bic">⧉</span>Copy for Claude</div>
</div>
<div id="sheetTabs" class="bsheet bsheet-r hidden"></div>
<div class="bbhit bbhit-l" onclick="toggleSheet('actions',event)"></div>
<div class="bbhit bbhit-r" onclick="toggleSheet('tabs',event)"></div>
<nav class="bottombar">
  <button class="bbtn" id="bbDots" onclick="toggleSheet('actions',event)" title="Actions"><svg viewBox="0 0 24 24" width="22" height="22" fill="currentColor"><circle cx="5" cy="12" r="1.9"/><circle cx="12" cy="12" r="1.9"/><circle cx="19" cy="12" r="1.9"/></svg></button>
  <button class="bbtn bbtn-mid" id="bbMid" onclick="midAction()" title="Next card"></button>
  <button class="bbtn" id="bbBurger" onclick="toggleSheet('tabs',event)" title="Tabs"><svg viewBox="0 0 24 24" width="22" height="22" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round"><path d="M4 7h16M4 12h16M4 17h16"/></svg></button>
</nav>

<script>
/* header bits */
function oddsRing(c,cap=500){const f=Math.max(0,Math.min(1,c/cap)),C=2*Math.PI*8,off=C*(1-f);const col=c>100?"var(--good)":c>30?"var(--away)":"var(--bad)";
  return `<span class="pill" title="Odds API credits left (of ${cap})" style="display:inline-flex;align-items:center;gap:6px;padding:5px 9px;font-size:11px"><svg width="18" height="18" viewBox="0 0 20 20"><circle cx="10" cy="10" r="8" fill="none" stroke="rgba(255,255,255,.12)" stroke-width="2.6"/><circle cx="10" cy="10" r="8" fill="none" stroke="${col}" stroke-width="2.6" stroke-linecap="round" stroke-dasharray="${C.toFixed(1)}" stroke-dashoffset="${off.toFixed(1)}" transform="rotate(-90 10 10)"/></svg><b style="color:var(--ink)">${c}</b></span>`;}
function fmtCd(ms){const m=Math.max(0,Math.floor(ms/6e4)),d=Math.floor(m/1440),h=Math.floor(m%1440/60);return d>0?`${d}d ${h}h`:`${h}h`;}
document.getElementById('oddsslot').innerHTML=oddsRing(412);
document.getElementById('nextcd').innerHTML=`🔒 ${fmtCd((2*1440+14*60)*6e4)}`;

/* squad pitch */
// type,name,pts,own,played,C,VC,bench,opp,kickoff(when unplayed)
// ...,opp,ko,goals,assists,transferredIn
/* squads / stats / league are loaded live from v2.json — see the fetch at the bottom */
function tier(p){const s=p[4];if(s===0)return"yet";if(s===2)return"dnp";const v=p[2];return v<=3?"red":v<=8?"gold":v<=13?"green":"purple";}
const GAP=6, tileW=o=>122-Math.min(o,55)/55*28, TILEH=66;  // width by ownership; lines of >3 split into two staggered rows so tiles stay wide
/* populated by the v2.json fetch at the bottom */
let SQUADS={}, STATS={}, MYNAMES=new Set(), ME="wirtzplay", GWNO=0, VIEWING="wirtzplay";
const squadFor=t=>SQUADS[t]||SQUADS[ME]||[];
const gwCol=(gw,avg)=>{const r=gw/avg;return r<0.9?'bd':r<=1.1?'am':r<1.5?'gd':'pk';};
const I_GOAL='⚽';
const I_ASSIST='👟';
const I_XFER='<svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="#16a34a" stroke-width="3.2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 12h12M11 7l5 5-5 5"/></svg>';
function bub(p,SC){const w=Math.round(tileW(p[3])*SC),h=Math.round(TILEH*SC),s=p[4];  // width by ownership (low own → wider = more impact)
  const sub=s===0?`${p[8]} • ${p[9]}`:s===2?`${p[8]} • DNP`:`${p[8]} • ${p[2]}`;
  const seg=Math.max(1,...String(p[1]).split(/[ \-]/).map(x=>x.length));  // longest unbreakable chunk
  const nf=Math.max(7.5,Math.min(12,h*0.30,(w-12)/(seg*0.6))).toFixed(1);  // fit that chunk; names wrap at spaces/hyphens
  const sf=Math.max(7.5,Math.min(10,h*0.20)).toFixed(1);
  const g=p[10],a=p[11],ti=p[12],warn=VIEWING!==ME&&!MYNAMES.has(p[1]);
  let bd='';
  if(p[5])bd+='<span class="cnr c-tr b-cap">C</span>';else if(p[6])bd+='<span class="cnr c-tr b-vc">V</span>';
  if(g&&a)bd+=`<span class="cnr c-tl b-icon">${I_GOAL}</span><span class="cnr c-tl2 b-icon">${I_ASSIST}</span>`;
  else if(g)bd+=`<span class="cnr c-tl b-icon">${I_GOAL}</span>`;else if(a)bd+=`<span class="cnr c-tl b-icon">${I_ASSIST}</span>`;
  if(ti)bd+=`<span class="cnr c-bl">${I_XFER}</span>`;
  if(warn)bd+='<span class="cnr c-br b-warn">!</span>';
  return `<div class="bub ${tier(p)} ${p[5]?'cap':p[6]?'vc':''}" style="width:${w}px;height:${h}px"><div class="in"><span class="nm" style="font-size:${nf}px">${p[1]}</span><span class="sub" style="font-size:${sf}px">${sub}</span></div>${bd}</div>`;}
function gwPill(team){const s=STATS[team]||STATS[ME]||{gw:0,avg:1,ml:'',gap:'',op:0,ovr:'',ovrUp:0,gwr:'',up:0,val:'',bank:''};const sl='<span class="sl">•</span>';
  const top=`<span class="pill ptop"><span class="k">GW</span><b>${GWNO}</b>${sl}<b class="${gwCol(s.gw,s.avg)}">${s.gw}</b><span class="mu">/${s.avg}</span>${sl}<b class="gd">${s.ml}</b> <span class="${(s.gap+'')[0]==='+'?'gd':'bd'}">${s.gap}</span>${sl}<span class="k">GWR</span><b>${s.gwr}</b> <span class="${s.up?'gd':'bd'}">${s.up?'▲':'▼'}</span></span>`;
  const bot=`<span class="pill pbot"><span class="k">OP</span><b>${s.op}</b>${sl}<span class="k">OR</span><b>${s.ovr}</b> <span class="${s.ovrUp?'gd':'bd'}">${s.ovrUp?'▲':'▼'}</span>${sl}<b>${s.val}</b><span class="mu"> +${s.bank}</span></span>`;
  return top+bot;}
function splitLine(a){return a.length<=3?[a]:[a.slice(0,Math.ceil(a.length/2)),a.slice(Math.ceil(a.length/2))];}
function renderPitch(team){
  VIEWING=team;
  const sq=squadFor(team), st=sq.filter(p=>!p[7]), benchArr=sq.filter(p=>p[7]);
  const subrows=[];[1,2,3,4].forEach(t=>{const l=st.filter(p=>p[0]===t);if(l.length)splitLine(l).forEach(r=>subrows.push(r));});  // lines of >3 → two staggered sub-rows
  const rowW=a=>a.reduce((s,p)=>s+tileW(p[3]),0)+(a.length-1)*GAP;
  const pr=document.getElementById('pitchrows');
  const avail=(pr.clientWidth||340)-2;
  const SC=Math.min(1, avail/Math.max(...subrows.map(rowW),1));               // starters scale off their own ≤3 rows → bigger tiles
  const BSC=Math.min(SC, (avail-6)/(benchArr.length?rowW(benchArr):1));        // bench keeps all 4 in one row, never bigger than starters
  pr.innerHTML=subrows.map(r=>`<div class="prow">${r.map(p=>bub(p,SC)).join('')}</div>`).join('');
  document.getElementById('bench').innerHTML=benchArr.map(p=>bub(p,BSC)).join('');
  document.getElementById('gwpill').innerHTML=gwPill(team);
  document.getElementById('whoName').textContent=team;
  document.getElementById('whoBack').classList.toggle('hidden',team===ME);
}
function flash(el){el.classList.remove('flash');void el.offsetWidth;el.classList.add('flash');setTimeout(()=>el.classList.remove('flash'),1300);}
function viewTeam(team){renderPitch(team);const c=document.getElementById('card-squad');c.scrollIntoView({behavior:'smooth',block:'start'});flash(c);}
function backHome(){viewTeam(ME);}

/* league table — rank,team,manager,captain,chipNow,chipsUsed[[name,count]],overallRank,gwPts,total,gap,xPts,xGI,isMe */
const PERSON='<svg class="icn" viewBox="0 0 24 24" fill="currentColor"><circle cx="12" cy="8" r="4"/><path d="M4 21a8 8 0 0 1 16 0z"/></svg>';
const gwTier=v=>v<25?'red':v<45?'gold':v<=50?'green':'purple';
const xpC=v=>v>=50?'g':v>=42?'a':'r';
const chipList=a=>(a||[]).map(([c,n])=>`<span class="${n>=2?'cu2':'cu1'}">${c}</span>`).join(' ');
function renderLeague(LG){document.getElementById('lgtable').innerHTML=
`<thead><tr><th>Team</th><th class="r">GW Pts</th><th class="r">Total</th><th class="r">xPts</th><th class="r">xGI</th></tr></thead><tbody>`+
(LG||[]).map(r=>{const me=r[12];return `<tr class="${me?'me':''}">
<td><div><span class="rk">${r[0]}</span> <span class="lname ${me?'lme':''}" onclick="viewTeam('${r[1].replace(/'/g,"\\'")}')">${r[1]}</span>${me?PERSON:''}${r[4]?`<span class="chipnow">${r[4]}</span>`:''}</div>
<div class="lsub">${r[2]} · ${r[3]}</div>
<div class="lsub2">${chipList(r[5])} · ${r[6]}</div></td>
<td class="r"><span class="gwbox ${gwTier(r[7])}">${r[7]}</span></td>
<td class="r"><b>${r[8]}</b>${r[9]?`<span class="gap">+${r[9]}</span>`:''}</td>
<td class="r"><span class="xv ${xpC(r[10])}">${r[10]}</span></td>
<td class="r"><span class="xv ${r[11]>=0.45?'g':'r'}">${(+r[11]).toFixed(1)}</span></td></tr>`}).join('')+`</tbody>`;}

/* nav: no toggle. default = myteam (cards: squad, league). mid = next-card / home */
const VIEW_ORDER=[["model","Model"],["stats","Stats"],["captain","Captain"],["thisgw","This GW"]];
const BURGER=VIEW_ORDER.map(v=>v[0]); let activeView="myteam";
const ICON_CHEV='<svg viewBox="0 0 24 24" width="26" height="26" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><path d="M6 10l6 6 6-6"/></svg>';
const ICON_HOME='<svg viewBox="0 0 24 24" width="23" height="23" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 11.5 12 4l9 7.5"/><path d="M5.5 10.5V20h13v-9.5"/></svg>';
function updateMid(){const b=document.getElementById('bbMid');const c=activeView==="myteam";b.innerHTML=c?ICON_CHEV:ICON_HOME;b.title=c?"Next card":"Home";}
function selectView(v){activeView=v;
  document.getElementById('myteam').style.display=v==="myteam"?"":"none";
  /* burger views would show/hide their panels here */
  renderTabSheet();closeSheets();updateMid();if(v!=="myteam")toast(VIEW_ORDER.find(x=>x[0]===v)[1]+" — placeholder");window.scrollTo({top:0,behavior:'smooth'});}
const CARDS=["card-squad","card-league"];let _ci=0;
function midAction(){ if(activeView!=="myteam"){selectView("myteam");return;}
  _ci=(_ci+1)%CARDS.length; const el=document.getElementById(CARDS[_ci]);
  el.scrollIntoView({behavior:'smooth',block:'center'});
  el.classList.remove('flash');void el.offsetWidth;el.classList.add('flash');setTimeout(()=>el.classList.remove('flash'),1300);}
function renderTabSheet(){document.getElementById('sheetTabs').innerHTML=VIEW_ORDER.map(([id,l])=>`<div class="tabrow ${activeView===id?'on':''}" onclick="selectView('${id}')">${l}</div>`).join('');}
function toggleSheet(w,e){if(e)e.stopPropagation();const a=document.getElementById('sheetActions'),t=document.getElementById('sheetTabs');const tg=w==="actions"?a:t,o=w==="actions"?t:a;o.classList.add('hidden');tg.classList.toggle('hidden');}
function closeSheets(){document.getElementById('sheetActions').classList.add('hidden');document.getElementById('sheetTabs').classList.add('hidden');}
function barAction(a,e){if(e)e.stopPropagation();closeSheets();toast(a==='rebuild'?'Rebuilding projections…':a==='export'?'Exported':'Copied for Claude');}
function toast(t){const el=document.getElementById('bbtoast');el.textContent=t;el.classList.add('show');setTimeout(()=>el.classList.remove('show'),1300);}
document.addEventListener('click',e=>{if(!e.target.closest('.bsheet,.bottombar,.bbhit'))closeSheets();});
renderTabSheet();updateMid();

/* ===== live data ===== */
fetch('v2.json',{cache:'no-store'}).then(r=>r.json()).then(V=>{
  SQUADS=V.squads||{}; STATS=V.stats||{}; ME=V.me||'wirtzplay'; GWNO=V.event||0; VIEWING=ME;
  MYNAMES=new Set((SQUADS[ME]||[]).map(p=>p[1]));
  try{
    const d=new Date(V.generated.replace(' ','T').replace(' UTC','')+':00Z');
    document.getElementById('updatedTime').textContent=d.toLocaleString('en-SG',{timeZone:'Asia/Singapore',weekday:'short',day:'numeric',month:'short',hour:'2-digit',minute:'2-digit',hour12:false})+' SGT';
  }catch(e){document.getElementById('updatedTime').textContent=V.generated;}
  renderPitch(ME);
  renderLeague(V.league);
}).catch(e=>{
  document.getElementById('pitchrows').innerHTML='<div style="padding:30px 16px;text-align:center;color:var(--bad)">Couldn\'t load live data (v2.json).</div>';
  document.getElementById('updatedTime').textContent='—';
});
</script>
